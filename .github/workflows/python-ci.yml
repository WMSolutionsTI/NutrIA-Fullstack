name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install --break-system-packages -r backend_python/requirements.txt -r backend_python/requirements-dev.txt

      - name: Run lint
        run: |
          cd backend_python
          ruff check .
          black --check .

      - name: Run tests
        run: |
          cd backend_python
          TEST_ENV=1 python -m pytest -q
