# =============================================================================
# NutrIA-Pro — CI/CD Pipeline: Frontend → Vercel
# =============================================================================
# Acionado quando há push para main com mudanças em frontend/ ou .github/
# Deploy automático na Vercel com preview para pull requests.
# =============================================================================

name: Frontend — Deploy Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-vercel.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'

defaults:
  run:
    working-directory: frontend

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Type Check
  # ---------------------------------------------------------------------------
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Verificar formatação
        run: npm run format:check

  # ---------------------------------------------------------------------------
  # Deploy para Vercel
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Vercel
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy na Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Comentar URL de preview na PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Preview Vercel disponível:** ${{ steps.deploy.outputs.preview-url }}`
            })
