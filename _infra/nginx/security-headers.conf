# HSTS — Força HTTPS por 1 ano
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Evita que navegadores "adivinhem" o tipo do arquivo (evita XSS via upload)
add_header X-Content-Type-Options "nosniff" always;

# Evita que sua página seja embutida em iframe de outro site (clickjacking)
add_header X-Frame-Options "DENY" always;

# Content Security Policy — define de onde podem vir scripts, estilos, etc.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;

# Controla informações enviadas no cabeçalho Referer
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
