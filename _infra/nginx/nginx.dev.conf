# =============================================================================
# NutrIA-Pro — Configuração Nginx para Desenvolvimento
# =============================================================================
# O Nginx aqui funciona como um "roteador":
#   /api/...      → encaminha para a API FastAPI (porta 8000)
#   /             → encaminha para o Frontend Next.js (porta 3000)
# =============================================================================

events {
    # Número máximo de conexões simultâneas por worker do Nginx
    worker_connections 1024;
}

http {
    # Inclui tipos MIME (diz ao browser como interpretar cada tipo de arquivo)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Formato do log de acesso
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Tamanho máximo de upload (para envio de planos alimentares, PDFs, etc.)
    client_max_body_size 50M;

    # Servidor principal
    server {
        listen 80;
        server_name localhost;

        # ------------------------------------------------------------------
        # Rota: /api/ → API FastAPI
        # Tudo que começa com /api/ é encaminhado para a API
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass http://api:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Rota: /docs → Swagger UI da API (documentação interativa)
        # ------------------------------------------------------------------
        location /docs {
            proxy_pass http://api:8000/docs;
            proxy_set_header Host $host;
        }

        # ------------------------------------------------------------------
        # Rota: / → Frontend Next.js
        # Tudo o mais vai para o frontend
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Necessário para hot-reload do Next.js funcionar via WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
