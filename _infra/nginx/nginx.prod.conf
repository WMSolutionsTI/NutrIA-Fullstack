# =============================================================================
# NutrIA-Pro — Configuração Nginx para Produção (VPS)
# =============================================================================
# NOTA: Em produção, este nginx NÃO é exposto diretamente à internet.
# O tráfego externo chega via Cloudflare Tunnel → cloudflared → rede Docker interna.
# Este nginx serve como roteador interno entre os serviços.
#
# Para usar, adicione ao docker-compose.prod.yml:
#   nginx:
#     image: nginx:alpine
#     volumes:
#       - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
#     networks:
#       - saas-internal
# =============================================================================

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Segurança: não expõe versão do nginx
    server_tokens off;

    # Tamanho máximo de upload (planos alimentares, PDFs)
    client_max_body_size 50M;

    # Gzip para performance
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting básico (proteção adicional além do Cloudflare)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ==========================================================================
    # API Backend (FastAPI)
    # ==========================================================================
    server {
        listen 80;
        server_name api.nutria-pro.com;

        # Rate limiting para autenticação
        location /v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SSE (Server-Sent Events) — sem timeout
        location /v1/events {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE precisa de conexão persistente
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;  # 24h
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # API REST geral
        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ==========================================================================
    # Chatwoot
    # ==========================================================================
    server {
        listen 80;
        server_name chat.nutria-pro.com;

        location / {
            proxy_pass http://chatwoot-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket para o Chatwoot
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
