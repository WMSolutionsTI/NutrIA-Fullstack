version: "3.9"

networks:
  nutria_overlay:
    driver: overlay

volumes:
  pg_data:
  rabbitmq_data:
  redis_data:
  minio_data:

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - nutria_overlay

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - nutria_overlay

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: nutria-pro
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - nutria_overlay

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - nutria_overlay

  api:
    image: ghcr.io/wmsolutionsti/nutria-pro-api:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      TOKEN_ENCRYPTION_SECRET: ${TOKEN_ENCRYPTION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - nutria_overlay
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  worker_atendimento:
    image: ghcr.io/wmsolutionsti/nutria-pro-api:latest
    command: python app/workers/rabbitmq_worker.py
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      CHATWOOT_URL: ${CHATWOOT_URL}
      CHATWOOT_API_KEY: ${CHATWOOT_API_KEY}
      TWILIO_CALL_API_URL: ${TWILIO_CALL_API_URL}
      TWILIO_API_TOKEN: ${TWILIO_API_TOKEN}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      VOICE_TWIML_URL: ${VOICE_TWIML_URL}
      VOICE_STATUS_CALLBACK_URL: ${VOICE_STATUS_CALLBACK_URL}
      TWILIO_VALIDATE_SIGNATURE: ${TWILIO_VALIDATE_SIGNATURE}
      TWILIO_WEBHOOK_PUBLIC_URL: ${TWILIO_WEBHOOK_PUBLIC_URL}
      RETELL_WEBHOOK_URL: ${RETELL_WEBHOOK_URL}
      RETELL_API_KEY: ${RETELL_API_KEY}
      ADMIN_CHATWOOT_ACCOUNT_ID: "1"
      ADMIN_CHATWOOT_CONVERSATION_ID: ${ADMIN_CHATWOOT_CONVERSATION_ID}
      ADMIN_CHATWOOT_CONTACTS: ${ADMIN_CHATWOOT_CONTACTS}
      ADMIN_ALERT_WEBHOOK_URL: ${ADMIN_ALERT_WEBHOOK_URL}
      ADMIN_ALERT_EMAIL: ${ADMIN_ALERT_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      WORKER_QUEUES: queue.atendimento
    networks:
      - nutria_overlay
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  worker_agenda_sync:
    image: ghcr.io/wmsolutionsti/nutria-pro-api:latest
    command: python app/workers/rabbitmq_worker.py
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI}
      WORKER_QUEUES: queue.agenda.sync
    networks:
      - nutria_overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  worker_arquivo_dispatch:
    image: ghcr.io/wmsolutionsti/nutria-pro-api:latest
    command: python app/workers/rabbitmq_worker.py
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      CHATWOOT_URL: ${CHATWOOT_URL}
      CHATWOOT_API_KEY: ${CHATWOOT_API_KEY}
      WORKER_QUEUES: queue.arquivo.dispatch
    networks:
      - nutria_overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  worker_voice:
    image: ghcr.io/wmsolutionsti/nutria-pro-api:latest
    command: python app/workers/rabbitmq_worker.py
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      TWILIO_CALL_API_URL: ${TWILIO_CALL_API_URL}
      TWILIO_API_TOKEN: ${TWILIO_API_TOKEN}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      VOICE_TWIML_URL: ${VOICE_TWIML_URL}
      VOICE_STATUS_CALLBACK_URL: ${VOICE_STATUS_CALLBACK_URL}
      RETELL_WEBHOOK_URL: ${RETELL_WEBHOOK_URL}
      RETELL_API_KEY: ${RETELL_API_KEY}
      WORKER_QUEUES: queue.voice.call
    networks:
      - nutria_overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  worker_admin_ops:
    image: ghcr.io/wmsolutionsti/nutria-pro-api:latest
    command: python app/workers/rabbitmq_worker.py
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      CHATWOOT_URL: ${CHATWOOT_URL}
      CHATWOOT_API_KEY: ${CHATWOOT_API_KEY}
      ADMIN_CHATWOOT_ACCOUNT_ID: "1"
      ADMIN_CHATWOOT_CONVERSATION_ID: ${ADMIN_CHATWOOT_CONVERSATION_ID}
      ADMIN_CHATWOOT_CONTACTS: ${ADMIN_CHATWOOT_CONTACTS}
      ADMIN_ALERT_WEBHOOK_URL: ${ADMIN_ALERT_WEBHOOK_URL}
      ADMIN_ALERT_EMAIL: ${ADMIN_ALERT_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      WORKER_QUEUES: queue.admin.ops
    networks:
      - nutria_overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - nutria_overlay
