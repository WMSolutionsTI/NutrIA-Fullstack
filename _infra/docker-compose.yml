          memory: 128M

  worker_retell_secretaria:
    build: ../backend_python
    command: python app/workers/retell_secretaria_v3_worker.py
    environment:
      - DATABASE_URL=postgresql://nutria_app:senha@postgres:5432/nutria
    depends_on:
      - backend
      - rabbitmq
    networks:
      - messaging_net
    deploy:
      replicas: 1
      resources:
        limits:
