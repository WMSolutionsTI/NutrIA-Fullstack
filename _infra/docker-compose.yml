    environment:
      - DATABASE_URL=postgresql://nutria_app:senha@postgres:5432/nutria
    depends_on:
      - backend
      - rabbitmq
    networks:
      - messaging_net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

  worker_leads:
    build: ../backend_python
    command: python app/workers/recuperacao_leads_worker.py
    environment:
      - DATABASE_URL=postgresql://nutria_app:senha@postgres:5432/nutria
    depends_on:
      - backend
      - rabbitmq
    networks:
      - messaging_net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
