    command: python -m app.workers  # __init__.py importa redis_worker, minio_worker, configuracoes_worker
    environment:
      - DATABASE_URL=postgresql://nutria_app:senha@postgres:5432/nutria
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=nutria-files
    depends_on:
      - backend
      - redis
      - minio
    networks:
      - backend_net
      - storage_net
