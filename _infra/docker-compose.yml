# =============================================================================
# NutrIA-Pro — Docker Compose para Desenvolvimento Local
# =============================================================================
# O Docker Compose permite subir vários "containers" (serviços) com um único
# comando: "make dev" (que por baixo executa "docker compose up -d")
#
# Cada bloco "services > nome-do-serviço" é um container independente.
# Eles se comunicam entre si pela rede interna definida no final do arquivo.
# =============================================================================

name: nutrisaas

# -----------------------------------------------------------------------------
# SERVIÇOS
# Cada serviço é um container que roda uma aplicação específica.
# -----------------------------------------------------------------------------
services:

  # ---------------------------------------------------------------------------
  # 🐍 API — Backend FastAPI (nossa aplicação principal)
  # ---------------------------------------------------------------------------
  api:
    build:

      version: '3.8'

      services:
        backend:
          build: ../backend_python
          command: gunicorn app.main:app --workers=3 --bind=0.0.0.0:8000 --timeout 120
          environment:
            - DATABASE_URL=postgresql://nutria_app:senha@postgres:5432/nutria
            - REDIS_URL=redis://:senha@redis:6379/0
            - RABBITMQ_URL=amqp://admin:senha@rabbitmq:5672/nutria
          depends_on:
            - postgres
            - redis
            - rabbitmq
          networks:
            - backend_net
            - messaging_net
          deploy:
            resources:
              limits:
                cpus: '1.0'
                memory: 1G
              reservations:
                cpus: '0.5'
                memory: 512M

        worker_secretaria:
          build: ../backend_python
          command: python app/workers/secretaria_v3_worker.py
          environment:
            - DATABASE_URL=postgresql://nutria_app:senha@postgres:5432/nutria
            - REDIS_URL=redis://:senha@redis:6379/0
            - RABBITMQ_URL=amqp://admin:senha@rabbitmq:5672/nutria
          depends_on:
            - backend
            - rabbitmq
          networks:
            - messaging_net
          deploy:
            replicas: 2
            resources:
              limits:
                cpus: '0.5'
                memory: 512M
              reservations:
                cpus: '0.25'
                memory: 256M

        worker_asaas:
          build: ../backend_python
          command: python app/workers/asaas_worker.py
          environment:
            - DATABASE_URL=postgresql://nutria_app:senha@postgres:5432/nutria
            - REDIS_URL=redis://:senha@redis:6379/0
            - RABBITMQ_URL=amqp://admin:senha@rabbitmq:5672/nutria
          depends_on:
            - backend
            - rabbitmq
          networks:
            - messaging_net
          deploy:
            replicas: 2
            resources:
              limits:
                cpus: '0.5'
                memory: 512M
              reservations:
                cpus: '0.25'
                memory: 256M

        worker_interno:
          build: ../backend_python
          command: python app/workers/assistente_interno_worker.py
          environment:
            - DATABASE_URL=postgresql://nutria_app:senha@postgres:5432/nutria
            - REDIS_URL=redis://:senha@redis:6379/0
            - RABBITMQ_URL=amqp://admin:senha@rabbitmq:5672/nutria
          depends_on:
            - backend
            - rabbitmq
          networks:
            - messaging_net
          deploy:
            replicas: 1
            resources:
              limits:
                cpus: '0.5'
                memory: 512M
              reservations:
                cpus: '0.25'
                memory: 256M

        postgres:
          image: postgres:16-alpine
          environment:
            POSTGRES_USER: nutria_app
            POSTGRES_PASSWORD: senha
            POSTGRES_DB: nutria
          volumes:
            - postgres_data:/var/lib/postgresql/data
          networks:
            - backend_net
          deploy:
            resources:
              limits:
                cpus: '0.5'
                memory: 512M
              reservations:
                cpus: '0.25'
                memory: 256M

        redis:
          image: redis:7-alpine
          command: redis-server --requirepass senha
          volumes:
            - redis_data:/data
          networks:
            - backend_net
          deploy:
            resources:
              limits:
                cpus: '0.25'
                memory: 256M
              reservations:
                cpus: '0.10'
                memory: 128M

        rabbitmq:
          image: rabbitmq:3-management
          environment:
            RABBITMQ_DEFAULT_USER: admin
            RABBITMQ_DEFAULT_PASS: senha
            RABBITMQ_DEFAULT_VHOST: nutria
          volumes:
            - rabbitmq_data:/var/lib/rabbitmq
          networks:
            - messaging_net
          deploy:
            resources:
              limits:
                cpus: '0.25'
                memory: 256M
              reservations:
                cpus: '0.10'
                memory: 128M

        minio:
          image: minio/minio
          command: server /data
          environment:
            - MINIO_ROOT_USER=minioadmin
            - MINIO_ROOT_PASSWORD=minioadmin
          volumes:
            - minio_data:/data
          networks:
            - storage_net
          deploy:
            resources:
              limits:
                cpus: '0.25'
                memory: 256M
              reservations:
                cpus: '0.10'
                memory: 128M

        nginx:
          image: nginx:alpine
          volumes:
            - ../backend_python/nginx.conf:/etc/nginx/nginx.conf:ro
          depends_on:
            - backend
          networks:
            - frontend_net
            - backend_net
          deploy:
            resources:
              limits:
                cpus: '0.25'
                memory: 256M
              reservations:
                cpus: '0.10'
                memory: 128M

      volumes:
        postgres_data:
        redis_data:
        rabbitmq_data:
        minio_data:

      networks:
        backend_net:
          driver: bridge
        messaging_net:
          driver: bridge
        storage_net:
          driver: bridge
        frontend_net:
          driver: bridge
      MINIO_ROOT_PASSWORD: minioadmin_dev_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # 🤖 N8N — Motor de automação (fluxos de trabalho visuais)
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # 💬 CHATWOOT — Hub central de comunicação com clientes
  # O Chatwoot é composto por 4 serviços que trabalham juntos:
  #   chatwoot-web     → interface web + API
  #   chatwoot-worker  → processa jobs em background (envio de mensagens, etc.)
  #   chatwoot-postgres → banco de dados exclusivo do Chatwoot
  #   chatwoot-redis   → cache exclusivo do Chatwoot
  # ---------------------------------------------------------------------------
  chatwoot-postgres:
    image: postgres:16-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M
    environment:
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot_dev_password
      POSTGRES_DB: chatwoot_production
    volumes:
      - chatwoot_postgres_data:/var/lib/postgresql/data
    networks:
      - chatwoot-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot -d chatwoot_production"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chatwoot-redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M
    command: redis-server --requirepass chatwoot_dev_password
    volumes:
      - chatwoot_redis_data:/data
    networks:
      - chatwoot-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "chatwoot_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chatwoot-web:
    image: chatwoot/chatwoot:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    ports:
      - "3001:3000"   # Painel do Chatwoot disponível em http://localhost:3001
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: chatwoot_dev_secret_key_base_change_in_production
      DATABASE_URL: postgres://chatwoot:chatwoot_dev_password@chatwoot-postgres:5432/chatwoot_production
      REDIS_URL: redis://:chatwoot_dev_password@chatwoot-redis:6379
      FRONTEND_URL: http://localhost:3001
      DEFAULT_LOCALE: pt_BR
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
    networks:
      - saas-internal
      - chatwoot-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/auth/sign_in"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  chatwoot-worker:
    image: chatwoot/chatwoot:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: chatwoot_dev_secret_key_base_change_in_production
      DATABASE_URL: postgres://chatwoot:chatwoot_dev_password@chatwoot-postgres:5432/chatwoot_production
      REDIS_URL: redis://:chatwoot_dev_password@chatwoot-redis:6379
      FRONTEND_URL: http://localhost:3001
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
    networks:
      - chatwoot-internal

  # ---------------------------------------------------------------------------
  # 🌐 FRONTEND — Dashboard Next.js (interface do nutricionista)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules   # Exceção: node_modules NÃO é montado do host
                            # (evita conflitos de sistema operacional)
      - /app/.next          # Cache de build do Next.js também fica no container
    env_file:
      - ../frontend/.env
    depends_on:
      - api
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # 🔀 NGINX — Proxy reverso (direciona as requisições para os serviços certos)
  # Um proxy reverso é como uma "portaria" que recebe todas as requisições e
  # as encaminha para o serviço correto com base na URL.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro   # :ro = somente leitura
    depends_on:
      - api
      - frontend
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# VOLUMES PERSISTENTES
# =============================================================================
# Volumes garantem que os dados NÃO se percam quando o container é parado
# ou removido. O Docker armazena esses dados em uma área gerenciada por ele.
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  n8n_data:
  chatwoot_postgres_data:
  chatwoot_redis_data:
  chatwoot_storage:

# =============================================================================
# REDES
# =============================================================================
# As redes isolam a comunicação entre serviços.
#
# saas-internal    → todos os serviços da NutrIA-Pro se comunicam aqui
# chatwoot-internal → rede privada interna do Chatwoot (postgres + redis + workers)
#
# O chatwoot-web fica em AMBAS as redes porque precisa:
#   - Falar com seu banco e redis (chatwoot-internal)
#   - Receber webhooks da nossa API (saas-internal)
# =============================================================================
networks:
  saas-internal:
    driver: bridge
  chatwoot-internal:
    driver: bridge
