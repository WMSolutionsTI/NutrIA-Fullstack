    command: python app/workers/plano_pdf_worker.py
    environment:
      - DATABASE_URL=postgresql://nutria_app:senha@postgres:5432/nutria
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=nutria-files
    depends_on:
      - backend
      - minio
    networks:
      - storage_net
    deploy:
