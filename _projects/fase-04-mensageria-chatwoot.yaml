project:
  name: "Fase 04 — Arquitetura de Mensageria e Integração Chatwoot"

labels:
  - name: messaging
    color: "#FF6600"
    description: "Arquitetura de mensageria, webhooks e processamento de mensagens"
  - name: chatwoot
    color: "#1F93FF"
    description: "Integração com Chatwoot API e webhooks"
  - name: backend
    color: "#009688"
    description: "Desenvolvimento do backend FastAPI"
  - name: security
    color: "#e11d48"
    description: "Segurança de webhooks e verificação de assinatura"
  - name: database
    color: "#336791"
    description: "Models e migrations"
  - name: feature
    color: "#22c55e"
