# fase-00-inicializacao.yaml
# Fase 0 — Fundação e Inicialização do Projeto
# Milestone: M0 — Projeto Inicializado

owner: WMSolutionsTI
repo: NutrIA-Pro

project:
  name: "Fase 00 — Fundação e Inicialização do Projeto"

labels:
  - name: setup
    color: "#e4e669"
    description: "Configuração inicial e estrutura do projeto"
  - name: documentation
    color: "#0075ca"
    description: "Documentação, ADRs e convenções"
  - name: tooling
    color: "#cfd3d7"
    description: "Ferramentas, linters e automações de desenvolvimento"
  - name: conventions
    color: "#f9d0c4"
    description: "Padrões de código e fluxo de trabalho"

milestones:
  - title: "M0 — Projeto Inicializado"
    due_date: "2026-03-21"
    description: "Repositório, convenções, ADRs e tooling em funcionamento"

issues:
  - title: "Criar estrutura do monorepo"
    body: |
      Criar a estrutura base do monorepo com todos os diretórios de serviços separados.
      Referência: Roadmap Fase 0, seção 0.1
    tasks:
      - "Criar diretório services/api/"
      - "Criar diretório services/workers/"
      - "Criar diretório services/frontend/"
      - "Criar diretório infra/"
      - "Criar diretório scripts/"
      - "Criar diretório docs/"
      - "Criar diretório .github/"
    labels:
      - setup
    milestone: "M0 — Projeto Inicializado"
    assignees:
      - WMSolutionsTI

  - title: "Configurar Git — branches e proteções"
    body: |
      Inicializar repositório Git com branches main e develop, aplicar branch protection rules.
      Referência: Roadmap Fase 0, seção 0.1.2 e 0.1.3
    tasks:
      - "Criar branch main e develop"
      - "Definir convenção de nomes: feat/<service>/<desc> e hotfix/<desc>"
      - "Habilitar branch protection em main: exigir PR review"
      - "Habilitar branch protection em main: exigir CI passing"
      - "Bloquear push direto em main"
    labels:
      - setup
    milestone: "M0 — Projeto Inicializado"
    assignees:
      - WMSolutionsTI

  - title: "Criar arquivos base do repositório"
    body: |
      Criar .gitignore, .editorconfig e README.md raiz.
      Referência: Roadmap Fase 0, seção 0.1.4
    tasks:
      - "Criar .gitignore cobrindo Python, Node.js, Docker e .env"
      - "Criar .editorconfig com indentação e charset padrão"
      - "Criar README.md raiz com visão geral do projeto"
    labels:
      - documentation
    milestone: "M0 — Projeto Inicializado"
    assignees:
      - WMSolutionsTI

  - title: "Configurar padrões de código Python"
    body: |
      Instalar e configurar ruff, black e mypy para o backend Python.
      Referência: Roadmap Fase 0, seção 0.2.1
    tasks:
      - "Instalar e configurar ruff para linting Python"
      - "Instalar e configurar black para formatação Python"
      - "Instalar e configurar mypy para type checking"
      - "Configurar pre-commit hook para lint e format"
    labels:
      - tooling
    milestone: "M0 — Projeto Inicializado"
    assignees:
      - WMSolutionsTI

  - title: "Configurar padrões de código TypeScript/Frontend"
    body: |
      Instalar e configurar eslint e prettier para o frontend Next.js.
      Referência: Roadmap Fase 0, seção 0.2.2
    tasks:
      - "Instalar e configurar eslint com regras strict"
      - "Instalar e configurar prettier para formatação"
      - "Configurar pre-commit hook para lint e format no frontend"
    labels:
      - tooling
    milestone: "M0 — Projeto Inicializado"
    assignees:
      - WMSolutionsTI

  - title: "Criar CONTRIBUTING.md e PR template"
    body: |
      Documentar convenções de commit (Conventional Commits), naming de branches, template de PR e padrões de code review.
      Referência: Roadmap Fase 0, seção 0.2.3
    tasks:
      - "Escrever CONTRIBUTING.md com formato de commit (Conventional Commits)"
      - "Documentar convenção de nomes de branch"
      - "Criar .github/pull_request_template.md com checklist"
      - "Documentar padrões de code review"
    labels:
      - documentation
      - conventions
    milestone: "M0 — Projeto Inicializado"
    assignees:
      - WMSolutionsTI

  - title: "Configurar pre-commit hooks"
    body: |
      Instalar framework pre-commit com hooks de lint, format, type check e secret scanning.
      Referência: Roadmap Fase 0, seção 0.2.4
    tasks:
      - "Instalar pre-commit framework"
      - "Configurar hook de linting Python (ruff)"
      - "Configurar hook de formatação (black/prettier)"
      - "Configurar hook de type check (mypy)"
      - "Configurar hook de secret scanning (detect-secrets)"
    labels:
      - tooling
    milestone: "M0 — Projeto Inicializado"
    assignees:
      - WMSolutionsTI

  - title: "Definir estratégia de variáveis de ambiente"
    body: |
      Criar .env.example para cada serviço e documentar todos os tiers de ambiente.
      Referência: Roadmap Fase 0, seção 0.3
    tasks:
      - "Criar services/api/.env.example com todas as variáveis documentadas"
      - "Criar services/workers/.env.example"
      - "Criar services/frontend/.env.example"
      - "Documentar tiers: local, staging, production"
      - "Definir política de gestão de secrets"
    labels:
      - setup
      - documentation
    milestone: "M0 — Projeto Inicializado"
    assignees:
      - WMSolutionsTI

  - title: "Criar Architecture Decision Records (ADRs) iniciais"
    body: |
      Criar pasta docs/adr/ e escrever os ADRs das decisões arquiteturais fundacionais do projeto.
      Referência: Roadmap Fase 0, seção 0.4
    tasks:
      - "Criar docs/adr/ e template de ADR"
      - "ADR-001: Por que FastAPI"
      - "ADR-002: Por que RabbitMQ (com path para Kafka documentado)"
      - "ADR-003: Estratégia de VPS único com expansão horizontal"
      - "ADR-004: Por que Chatwoot como hub de comunicação"
      - "ADR-005: Por que n8n para automações"
      - "ADR-006: Inbox ID como identificador de tenant"
      - "ADR-007: Multi-tenancy com row-level isolation no PostgreSQL"
      - "ADR-008: MinIO como object storage S3-compatível"
    labels:
      - documentation
    milestone: "M0 — Projeto Inicializado"
    assignees:
      - WMSolutionsTI

  - title: "Criar Makefile com comandos utilitários"
    body: |
      Criar Makefile raiz com os principais comandos de desenvolvimento, teste e deploy.
      Referência: Roadmap Fase 0, seção 0.5.1
    tasks:
      - "Comando make dev — subir ambiente de desenvolvimento"
      - "Comando make test — rodar suíte de testes"
      - "Comando make migrate — rodar migrations"
      - "Comando make lint — rodar todos os linters"
      - "Comando make build — buildar imagens Docker"
      - "Comando make logs — tail de logs dos containers"
    labels:
      - tooling
    milestone: "M0 — Projeto Inicializado"
    assignees:
      - WMSolutionsTI
