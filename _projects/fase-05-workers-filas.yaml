issues:
  - title: "Definir e declarar topologia completa de exchanges e filas"
    body: |
      Implementar todas as exchanges, filas, bindings e configurações de dead-letter no RabbitMQ.
      Referência: Roadmap Fase 5, seção 5.1
    tasks:
      - "Criar exchange chatwoot.events (topic)"
      - "Criar exchange automation.triggers (topic)"
      - "Criar exchange notifications.outbound (direct)"
      - "Criar exchange scheduler.tasks (topic)"
      - "Criar exchange billing.events (direct)"
      - "Criar exchange deadletter (direct)"
      - "Criar exchange ai.clinical (topic) para eventos do pipeline clínico"
      - "Criar fila message.processor com DLX e TTL configurados"
      - "Criar fila conversation.processor com DLX"
      - "Criar fila automation.executor com DLX"
      - "Criar fila notification.sender com DLX"
      - "Criar fila scheduler.executor com DLX"
      - "Criar fila billing.processor com DLX"
      - "Criar fila deadletter.queue"
      - "Criar fila anamnesis.conductor com DLX — conduz entrevista de anamnese"
      - "Criar fila meal_plan.generator com DLX — gera plano alimentar com IA"
      - "Criar fila meal_plan.pdf com DLX — renderiza e envia PDF do plano"
      - "Criar fila followup.daily com DLX — acompanhamento diário pós-consulta"
      - "Configurar prefetch_count inicial de 10 por worker"
    labels:
      - queue
    milestone: "M5 — Sistema de Workers Operacional"
    assignees:
      - WMSolutionsTI

  - title: "Criar serviço base de workers com BaseConsumer"
    body: |
      Scaffoldar o serviço de workers e implementar a classe abstrata BaseConsumer com conexão, retry e graceful shutdown.
      Referência: Roadmap Fase 5, seção 5.2
    tasks:
      - "Criar estrutura de diretórios do serviço workers"
      - "Implementar BaseConsumer: conexão RabbitMQ, declarações idempotentes"
      - "Implementar loop de consumo com error handling"
      - "ACK em sucesso, NACK sem requeue em erro de negócio → DLQ"
      - "NACK com requeue + delay em erro transiente → retry"
      - "Implementar estratégia de retry: 3 tentativas com backoff 2s/4s/8s via headers"
      - "Implementar padrão de idempotência: checar/gravar worker:processed:{message_id} no Redis (TTL 48h)"
      - "Implementar graceful shutdown: capturar SIGTERM, finalizar mensagem em andamento, fechar conexões"
      - "Criar Dockerfile para o serviço workers"
    labels:
      - workers
      - reliability
    milestone: "M5 — Sistema de Workers Operacional"
    assignees:
      - WMSolutionsTI

  - title: "Implementar MessageProcessorConsumer"
    body: |
      Worker que consome mensagens de message.processor e executa o pipeline completo de processamento.
      Referência: Roadmap Fase 5, seção 5.3
    tasks:
      - "Validar payload com schema Pydantic"
      - "Resolver tenant por inbox_id"
      - "Checar status do tenant e limites de uso"
      - "Upsert de registro de cliente"
      - "Gravar mensagem no banco de dados"
      - "Atualizar last_message_at na conversa"
      - "Publicar evento de automação se regra for acionada"
      - "Incrementar contador messages_received no UsageTrackingService"
      - "Implementar download de anexos e upload para MinIO"
    labels:
      - workers
    milestone: "M5 — Sistema de Workers Operacional"
    assignees:
      - WMSolutionsTI

  - title: "Implementar NotificationSenderConsumer"
    body: |
      Worker que envia mensagens de saída para clientes via API do Chatwoot.
      Referência: Roadmap Fase 5, seção 5.4
    tasks:
      - "Consumir fila notification.sender"
      - "Chamar ChatwootAPIClient.send_message() com retry em rate limiting (429)"
      - "Gravar mensagem outbound no banco de dados"
      - "Incrementar contador messages_sent no UsageTrackingService"
      - "Redirecionar falhas para DLQ com detalhes do erro"
    labels:
      - workers
    milestone: "M5 — Sistema de Workers Operacional"
    assignees:
      - WMSolutionsTI

  - title: "Implementar sistema de tarefas agendadas (SchedulerWorker)"
    body: |
      Construir o sistema de agendamento de tarefas futuras com tabela, polling e worker executor.
      Referência: Roadmap Fase 5, seção 5.5
    tasks:
      - "Criar model e migration da tabela scheduled_tasks"
      - "Suportar task_types: send_reminder, follow_up_message, appointment_reminder, reactivation_campaign"
      - "Implementar background task de polling a cada 60 segundos"
      - "Publicar tarefas vencidas na fila scheduler.tasks"
      - "Atualizar status da task para queued ao publicar (evitar duplo-envio)"
      - "Implementar SchedulerExecutorConsumer"
      - "Despachar task para handler correto por task_type"
      - "Atualizar status da task para executed ou failed"
    labels:
      - workers
    milestone: "M5 — Sistema de Workers Operacional"
    assignees:
      - WMSolutionsTI

  - title: "Implementar Dead Letter Queue (DLQ) handler e painel admin"
    body: |
      Monitor de DLQ com armazenamento, alertas e funcionalidade de replay.
      Referência: Roadmap Fase 5, seção 5.6
    tasks:
      - "Implementar consumer da deadletter.queue"
      - "Logar detalhes completos: fila de origem, razão do erro, tenant_id, payload"
      - "Gravar registro na tabela dead_letter_events para revisão admin"
      - "Disparar alerta no sistema de monitoramento para alto volume de DLQ"
      - "Implementar POST /admin/dlq/{id}/replay"
      - "Implementar GET /admin/dlq com filtros por tenant e fila"
    labels:
