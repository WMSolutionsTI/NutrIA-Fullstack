  - title: "[FEATURE] Painel de configuração do Agente de IA para o nutricionista"
    body: |
      O nutricionista configura no seu painel:
      - Nome da secretária virtual (ex: "Ana")
      - Prompt de contexto (especialidade, tom de voz, informações sobre a clínica)
      - Horário de atendimento do agente
      - Mensagem de fora do horário
      - Mensagem de boas-vindas
      - Lista de tópicos que devem escalar para humano automaticamente

      Estes dados alimentam o workflow `01. Secretária v3.json` por tenant.
    labels:
      - feature
      - frontend
      - ai-agent
    milestone: "M7 — Funcionalidades de Negócio Completas"
    assignees:
      - WMSolutionsTI

  - title: "[FEATURE] Fluxo completo de escalação e retomada do agente de IA"
    body: |
      Fluxo end-to-end:

      1. IA detecta necessidade de escalação (ou cliente solicita falar com humano)
      2. Worker desabilita `ai_agent_enabled` para aquele contato
      3. Mensagem enviada ao cliente: "Vou transferir você para [Nome do Nutricionista] agora. Aguarde!"
      4. WhatsApp enviado ao nutricionista: "⚠️ Atenção! [Nome do Cliente] precisa de atendimento humano. Acesse a conversa: [link Chatwoot]"
      5. Nutricionista atende no Chatwoot
      6. Nutricionista clica em "Retomar IA" no painel (ou via API)
      7. Mensagem enviada ao cliente: "Olá! Estou de volta para continuar te ajudando! 😊"
      8. `ai_agent_enabled` = true, log registrado
    labels:
      - feature
      - ai-agent
      - human-escalation
      - chatwoot
    milestone: "M7 — Funcionalidades de Negócio Completas"
    assignees:
      - WMSolutionsTI

  - title: "[FEATURE] Envio de planos alimentares via Google Drive"
    body: |
